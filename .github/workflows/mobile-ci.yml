name: Mobile CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/mobile/**'

jobs:
  test-mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: apps/mobile/package-lock.json

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: npm run lint

    - name: Run type checking
      run: npm run type-check

    - name: Run tests
      run: npm test -- --coverage --watchAll=false
      env:
        CI: true

  build-android:
    needs: test-mobile
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: apps/mobile/package-lock.json

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      run: npm ci

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon

    - name: Upload Android APK
      uses: actions/upload-artifact@v3
      with:
        name: dokanx-android-${{ github.sha }}
        path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk

  build-ios:
    needs: test-mobile
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: apps/mobile/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Cache CocoaPods
      uses: actions/cache@v3
      with:
        path: apps/mobile/ios/Pods
        key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-pods-

    - name: Install CocoaPods
      run: |
        cd ios
        pod install

    - name: Build iOS
      run: |
        cd ios
        xcodebuild -workspace DokanX.xcworkspace -scheme DokanX -configuration Release -destination generic/platform=iOS -archivePath build/DokanX.xcarchive archive

    - name: Export IPA
      run: |
        cd ios
        xcodebuild -exportArchive -archivePath build/DokanX.xcarchive -exportPath build -exportOptionsPlist ExportOptions.plist

    - name: Upload iOS IPA
      uses: actions/upload-artifact@v3
      with:
        name: dokanx-ios-${{ github.sha }}
        path: apps/mobile/ios/build/DokanX.ipa

  deploy-testflight:
    needs: build-ios
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download iOS IPA
      uses: actions/download-artifact@v3
      with:
        name: dokanx-ios-${{ github.sha }}
        path: ./artifacts

    - name: Deploy to TestFlight
      run: |
        # Install Fastlane if not present
        gem install fastlane

        # Configure Fastlane
        cd apps/mobile/ios
        fastlane beta

  deploy-play-store:
    needs: build-android
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Android APK
      uses: actions/download-artifact@v3
      with:
        name: dokanx-android-${{ github.sha }}
        path: ./artifacts

    - name: Deploy to Play Store
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
        packageName: com.dokanx.mobile
        releaseFiles: ./artifacts/app-release.apk
        track: internal
        inAppUpdatePriority: 3
        whatsNewDirectory: whatsnew