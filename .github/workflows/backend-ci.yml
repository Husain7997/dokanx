name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/backend/**'

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: apps/backend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: npm run lint

    - name: Run tests
      run: npm test -- --coverage --watchAll=false
      env:
        CI: true

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./apps/backend/coverage/lcov.info
        flags: backend
        name: backend-coverage

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./infrastructure/docker/backend.Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

    - name: Deploy to staging
      run: |
        # Update backend deployment image
        kubectl set image deployment/dokanx-backend backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop -n dokanx-staging
        kubectl set image deployment/dokanx-backend-worker backend-worker=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop -n dokanx-staging
        kubectl set image deployment/dokanx-backend-scheduler backend-scheduler=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop -n dokanx-staging

        # Wait for rollout
        kubectl rollout status deployment/dokanx-backend -n dokanx-staging --timeout=300s
        kubectl rollout status deployment/dokanx-backend-worker -n dokanx-staging --timeout=300s
        kubectl rollout status deployment/dokanx-backend-scheduler -n dokanx-staging --timeout=300s

        # Run database migrations if needed
        kubectl exec -n dokanx-staging deployment/dokanx-backend -- npm run migrate

  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

    - name: Deploy to production
      run: |
        # Update backend deployment image
        kubectl set image deployment/dokanx-backend backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest -n dokanx
        kubectl set image deployment/dokanx-backend-worker backend-worker=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest -n dokanx
        kubectl set image deployment/dokanx-backend-scheduler backend-scheduler=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest -n dokanx

        # Wait for rollout
        kubectl rollout status deployment/dokanx-backend -n dokanx --timeout=300s
        kubectl rollout status deployment/dokanx-backend-worker -n dokanx --timeout=300s
        kubectl rollout status deployment/dokanx-backend-scheduler -n dokanx --timeout=300s

        # Run database migrations if needed
        kubectl exec -n dokanx deployment/dokanx-backend -- npm run migrate

    - name: Run smoke tests
      run: |
        # Wait for service to be ready
        sleep 30

        # Run basic health checks
        curl -f https://api.dokanx.com/health || exit 1
        curl -f "https://api.dokanx.com/metrics?format=prometheus" || exit 1
        curl -f https://api.dokanx.com/api/v1/products || exit 1
