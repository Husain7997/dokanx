name: backend-ci-cd

on:
  push:
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "docker/**"
      - ".github/workflows/backend-ci-cd.yml"
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"

jobs:
  test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint (non-blocking placeholder)
        run: npm run lint --if-present

      - name: Test
        run: npm test -- --runInBand

      - name: Build Docker image
        run: docker build -t dokanx-backend:${{ github.sha }} -f docker/production/Dockerfile.api .
