version: "3.9"

services:
  api:
    build:
      context: ../../
      dockerfile: apps/backend/docker/production/Dockerfile.api
    env_file:
      - ../../.env
    depends_on:
      - mongo
      - redis
    ports:
      - "5001:5001"

  worker:
    build:
      context: ../../
      dockerfile: apps/backend/docker/production/Dockerfile.worker
    env_file:
      - ../../.env
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"

volumes:
  mongo_data:
