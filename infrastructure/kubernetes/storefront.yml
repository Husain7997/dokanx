apiVersion: apps/v1
kind: Deployment
metadata:
  name: dokanx-storefront
  namespace: dokanx
  labels:
    app: dokanx-storefront
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dokanx-storefront
  template:
    metadata:
      labels:
        app: dokanx-storefront
    spec:
      containers:
      - name: storefront
        image: dokanx/storefront:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://dokanx-backend:3001"
        - name: NEXT_PUBLIC_WS_URL
          value: "ws://dokanx-backend:3001"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: dokanx-storefront
  namespace: dokanx
  labels:
    app: dokanx-storefront
spec:
  selector:
    app: dokanx-storefront
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP