apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dokanx-backend-hpa
  namespace: dokanx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dokanx-backend
  minReplicas: 4
  maxReplicas: 12
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 4
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      selectPolicy: Min
      policies:
      - type: Percent
        value: 20
        periodSeconds: 60
---
