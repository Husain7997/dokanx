apiVersion: apps/v1
kind: Deployment
metadata:
  name: dokanx-merchant-dashboard
  namespace: dokanx
  labels:
    app: dokanx-merchant-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dokanx-merchant-dashboard
  template:
    metadata:
      labels:
        app: dokanx-merchant-dashboard
    spec:
      containers:
      - name: merchant-dashboard
        image: dokanx/merchant-dashboard:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.dokanx.com"
        - name: NEXT_PUBLIC_ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dokanx-merchant-dashboard
  namespace: dokanx
  labels:
    app: dokanx-merchant-dashboard
spec:
  selector:
    app: dokanx-merchant-dashboard
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
  type: ClusterIP