version: '3.8'

services:
  # Database Services
  mongodb:
    image: mongo:7.0
    container_name: dokanx-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: dokanx
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init:/docker-entrypoint-initdb.d
    networks:
      - dokanx-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dokanx-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/etc/redis/redis.conf
    command: redis-server /etc/redis/redis.conf
    networks:
      - dokanx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service
  backend:
    build:
      context: ../../apps/backend
      dockerfile: ../../infrastructure/docker/backend.Dockerfile
    container_name: dokanx-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/dokanx
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret}
      SESSION_SECRET: ${SESSION_SECRET:-your-session-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/backend/logs:/app/logs
    networks:
      - dokanx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Services
  storefront-web:
    build:
      context: ../../apps/frontend/storefront-web
      dockerfile: ../../../infrastructure/docker/frontend.Dockerfile
    container_name: dokanx-storefront
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
      NEXT_PUBLIC_WS_URL: ws://backend:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - dokanx-network

  merchant-dashboard:
    build:
      context: ../../apps/frontend/merchant-dashboard
      dockerfile: ../../../infrastructure/docker/frontend.Dockerfile
    container_name: dokanx-merchant-dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
      NEXT_PUBLIC_WS_URL: ws://backend:3001
    ports:
      - "3002:3000"
    depends_on:
      - backend
    networks:
      - dokanx-network

  admin-panel:
    build:
      context: ../../apps/frontend/admin-panel
      dockerfile: ../../../infrastructure/docker/frontend.Dockerfile
    container_name: dokanx-admin-panel
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
      NEXT_PUBLIC_WS_URL: ws://backend:3001
    ports:
      - "3003:3000"
    depends_on:
      - backend
    networks:
      - dokanx-network

  developer-portal:
    build:
      context: ../../apps/frontend/developer-portal
      dockerfile: ../../../infrastructure/docker/frontend.Dockerfile
    container_name: dokanx-developer-portal
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
    ports:
      - "3004:3000"
    depends_on:
      - backend
    networks:
      - dokanx-network

  # Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: dokanx-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - storefront-web
      - merchant-dashboard
      - admin-panel
      - developer-portal
    networks:
      - dokanx-network

  # Monitoring Services
  prometheus:
    image: prom/prometheus:latest
    container_name: dokanx-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - dokanx-network

  grafana:
    image: grafana/grafana:latest
    container_name: dokanx-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3005:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - dokanx-network

  # Logging
  loki:
    image: grafana/loki:latest
    container_name: dokanx-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - dokanx-network

  promtail:
    image: grafana/promtail:latest
    container_name: dokanx-promtail
    restart: unless-stopped
    volumes:
      - ../../apps/backend/logs:/var/log/dokanx
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - dokanx-network

volumes:
  mongodb_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  nginx_logs:

networks:
  dokanx-network:
    driver: bridge